<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냉장고 재료 인식기 - Step 1</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
        }

        #image-preview {
            max-width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #result-area {
            margin-top: 30px;
        }

        .ingredient-tag {
            display: inline-block;
            background: #e1effe;
            color: #1e429f;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 4px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            display: none;
            margin: 20px 0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>냉장고를 부탁해! (Step 1)</h1>
        
        <div class="upload-area" id="drop-zone">
            <p>냉장고 사진을 업로드하거나 드래그하세요.</p>
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <img id="image-preview" alt="미리보기">
        </div>

        <button id="analyze-btn" class="btn" disabled>식재료 분석하기</button>

        <div class="loading" id="loading-spinner">
            <p>Gemini가 사진을 분석 중입니다...</p>
        </div>

        <div id="result-area">
            <h3>인식된 식재료:</h3>
            <div id="ingredient-list"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
